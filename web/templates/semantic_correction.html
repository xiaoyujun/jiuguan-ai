<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修正数据引用 - AI角色扮演系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/semantic_search.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .correction-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: var(--shadow-subtle);
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message-content {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            color: var(--text-color);
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .storybook-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .storybook-search-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        .storybook-search {
            background: var(--secondary-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 15px;
            color: var(--text-color);
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .storybook-search:focus {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.3);
        }

        .storybook-search::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .storybook-select {
            background: var(--secondary-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 15px;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .storybook-select:focus {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.3);
        }

        .category-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-item:hover {
            background: rgba(255, 143, 0, 0.1);
        }

        .category-item input[type="checkbox"] {
            cursor: pointer;
        }

        .extract-button {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: 2px solid #28a745;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .extract-button:hover {
            background: linear-gradient(135deg, #34ce57 0%, #17a2b8 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .extract-button:disabled {
            background: #6c757d;
            border-color: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .keywords-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .category-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .category-section-title {
            font-weight: 600;
            color: var(--text-gold);
            margin-bottom: 10px;
            font-size: 16px;
        }

        .subcategory {
            margin-bottom: 15px;
        }

        .subcategory-title {
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .keyword-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        .keyword-item.approved {
            background: rgba(40, 167, 69, 0.2);
            border-left: 3px solid #28a745;
        }

        .keyword-item.rejected {
            background: rgba(220, 53, 69, 0.2);
            border-left: 3px solid #dc3545;
            opacity: 0.6;
        }

        .keyword-text {
            color: var(--text-color);
            flex: 1;
        }

        .keyword-weight {
            color: var(--text-gold);
            font-size: 12px;
            margin-right: 10px;
            min-width: 50px;
        }

        .keyword-actions {
            display: flex;
            gap: 5px;
        }

        .keyword-btn {
            background: none;
            border: 1px solid;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .approve-btn {
            border-color: #28a745;
            color: #28a745;
        }

        .approve-btn:hover {
            background: #28a745;
            color: white;
        }

        .reject-btn {
            border-color: #dc3545;
            color: #dc3545;
        }

        .reject-btn:hover {
            background: #dc3545;
            color: white;
        }

        .save-section {
            display: none;
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.1) 0%, rgba(23, 162, 184, 0.1) 100%);
            border: 2px solid #28a745;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .save-section.show {
            display: block;
        }

        .save-summary {
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .save-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .save-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: 2px solid #28a745;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #34ce57 0%, #17a2b8 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .cancel-btn {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            border: 2px solid #6c757d;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .cancel-btn:hover {
            background: linear-gradient(135deg, #7a8288 0%, #6c757d 100%);
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--text-color);
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--gold-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 15px;
            color: #dc3545;
            margin: 15px 0;
            display: none;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid #28a745;
            border-radius: 8px;
            padding: 15px;
            color: #28a745;
            margin: 15px 0;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .correction-container {
                padding: 15px;
            }
            
            .keywords-grid {
                grid-template-columns: 1fr;
            }
            
            .storybook-selector {
                flex-direction: column;
                align-items: stretch;
            }
            
            .storybook-search-container {
                min-width: 100%;
            }
            
            .storybook-select {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 修正数据引用</h1>
            <p class="subtitle">通过AI分析提取关键词，优化语义搜索准确性</p>
        </header>

        <div class="correction-container">
            <!-- 消息内容区域 -->
            <div class="section">
                <div class="section-title">
                    <span>💬</span>
                    消息内容
                </div>
                <div id="messageContent" class="message-content">
                    <!-- 消息内容将通过JavaScript填充 -->
                </div>
            </div>

            <!-- 数据书选择区域 -->
            <div class="section">
                <div class="section-title">
                    <span>📚</span>
                    选择期望关联的数据书
                </div>
                <div class="storybook-selector">
                    <div class="storybook-search-container">
                        <input type="text" id="storybookSearch" class="storybook-search" placeholder="🔍 搜索数据书名称...">
                        <select id="storybookSelect" class="storybook-select">
                            <option value="">请选择数据书...</option>
                        </select>
                    </div>
                    <button id="refreshStorybooks" class="extract-button" style="padding: 8px 15px; font-size: 14px;">
                        🔄 刷新列表
                    </button>
                </div>
            </div>

            <!-- 分类选择区域 -->
            <div class="section">
                <div class="section-title">
                    <span>🏷️</span>
                    选择期望的关键词分类
                </div>
                <div class="category-checkboxes">
                    <label class="category-item">
                        <input type="checkbox" value="gender" checked>
                        <span>性别特征 (gender)</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" value="sports" checked>
                        <span>运动特征 (sports)</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" value="personality" checked>
                        <span>性格特征 (personality)</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" value="occupation" checked>
                        <span>职业特征 (occupation)</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" value="race" checked>
                        <span>种族特征 (race)</span>
                    </label>
                </div>
                
                <div style="margin-top: 15px; text-align: center;">
                    <button id="extractKeywordsBtn" class="extract-button">
                        <span>🤖</span>
                        AI分析提取关键词
                    </button>
                </div>
            </div>

            <!-- 加载指示器 -->
            <div id="loadingIndicator" class="loading-indicator">
                <div class="loading-spinner"></div>
                <div>AI正在分析消息内容...</div>
            </div>

            <!-- 错误和成功消息 -->
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <!-- 关键词审批区域 -->
            <div id="keywordsSection" class="section" style="display: none;">
                <div class="section-title">
                    <span>✅</span>
                    审批提取的关键词
                </div>
                <div id="keywordsGrid" class="keywords-grid">
                    <!-- AI提取的关键词将在这里显示 -->
                </div>
            </div>

            <!-- 保存区域 -->
            <div id="saveSection" class="save-section">
                <div class="save-summary">
                    <div>已选择关键词: <span id="approvedCount">0</span> 个</div>
                    <div>已拒绝关键词: <span id="rejectedCount">0</span> 个</div>
                </div>
                <div class="save-buttons">
                    <button id="saveBtn" class="save-btn">💾 保存关键词到用户配置</button>
                    <button id="cancelBtn" class="cancel-btn">❌ 取消修正</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/semantic_correction.js') }}"></script>
</body>
</html>
