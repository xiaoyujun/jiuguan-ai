<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全局世界书 - 神秘学编年史</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_worldbook.css') }}">
</head>
<body>
    <div class="worldbook-container">
        <!-- 页面标题 -->
        <div class="worldbook-header">
            <div class="header-content">
                <h1>全局世界书</h1>
                <p class="header-subtitle">记录世界的奥秘与传说</p>
            </div>
            <div class="header-actions">
                <button class="btn-primary" onclick="createNewEntry()">
                    ✦ 创建新条目
                </button>
                <button class="btn-secondary" onclick="window.location.href='/'">
                    ← 返回主页
                </button>
            </div>
        </div>

        <!-- 条目列表 -->
        <div class="worldbook-content">
            <div class="entries-grid" id="entries-grid">
                <!-- 条目卡片将通过JavaScript动态加载 -->
                <div class="loading-placeholder">
                    <div class="loading-text">正在加载世界书条目...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">编辑条目</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="entry-form">
                    <div class="form-group">
                        <label for="entry-name">条目名称</label>
                        <input type="text" id="entry-name" name="entry-name" required>
                    </div>
                    <div class="form-group">
                        <label for="entry-description">条目介绍</label>
                        <textarea id="entry-description" name="entry-description" rows="8" placeholder="描述这个条目的内容..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="saveEntry()">保存</button>
                <button class="btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn-danger" id="delete-btn" onclick="deleteEntry()" style="display: none;">删除</button>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>确认删除</h2>
            </div>
            <div class="modal-body">
                <p>确定要删除条目 "<span id="delete-entry-name"></span>" 吗？</p>
                <p class="warning-text">此操作无法撤销！</p>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" onclick="confirmDelete()">确认删除</button>
                <button class="btn-secondary" onclick="closeConfirmModal()">取消</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/global_worldbook.js') }}"></script>
</body>
</html>
