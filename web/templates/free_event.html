<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由事件 - 多角色对话</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/free_event.css') }}">
</head>
<body>
    <div class="event-container">
        <!-- 头部 -->
        <div class="event-header">
            <h1>自由事件</h1>
            <div class="header-actions">
                <button class="btn-secondary" onclick="window.location.href='/'">返回主页</button>
                <button class="btn-primary" onclick="saveEvent()">保存事件</button>
                <button class="btn-secondary" onclick="loadEventModal()">加载事件</button>
            </div>
        </div>

        <!-- 事件配置区 -->
        <div class="event-config" id="eventConfig">
            <h2>事件配置</h2>
            
            <div class="config-section">
                <label for="eventName">事件名称：</label>
                <input type="text" id="eventName" placeholder="输入事件名称" class="input-field">
            </div>
            
            <div class="config-section">
                <label for="eventDescription">事件背景：</label>
                <textarea id="eventDescription" rows="3" placeholder="描述事件背景..." class="input-field"></textarea>
            </div>
            
            <div class="config-section">
                <label>参与者选择：</label>
                
                <!-- 标签切换 -->
                <div class="participant-tabs">
                    <button class="tab-btn active" onclick="switchParticipantTab('roles')" id="rolesTab">
                        🎭 角色
                    </button>
                    <button class="tab-btn" onclick="switchParticipantTab('players')" id="playersTab">
                        👤 玩家
                    </button>
                </div>
                
                <div class="role-search">
                    <input type="text" id="roleSearch" placeholder="搜索..." class="input-field search-input">
                    <span class="search-icon">🔍</span>
                </div>
                
                <!-- 角色列表 -->
                <div class="role-list" id="roleList">
                    <!-- 角色列表将动态加载 -->
                </div>
                
                <!-- 玩家列表 -->
                <div class="role-list" id="playerList" style="display: none;">
                    <!-- 玩家列表将动态加载 -->
                </div>
                
                <div class="selected-roles" id="selectedRoles">
                    <h3>已选择的参与者 (<span id="selectedCount">0</span>)：</h3>
                    <div class="selected-roles-container" id="selectedRolesContainer">
                        <!-- 已选择的参与者将显示在这里 -->
                    </div>
                </div>
            </div>
            
            <div class="config-actions">
                <button class="btn-primary btn-large" onclick="startEvent()">开始事件</button>
            </div>
        </div>

        <!-- 事件对话区 -->
        <div class="event-chat" id="eventChat" style="display: none;">
            <div class="chat-header">
                <h2 id="chatEventName">事件进行中</h2>
                <div class="chat-actions">
                    <button class="btn-secondary btn-sm" onclick="toggleProbabilityPanel()">设置概率</button>
                    <button class="btn-secondary btn-sm" onclick="openTopicTemplateModal()">话题模板</button>
                    <button class="btn-secondary btn-sm" onclick="summarizeEvent()">总结到数据书</button>
                    <button class="btn-secondary btn-sm" onclick="reduceEventLoad()">减负记录</button>
                    <button class="btn-secondary btn-sm" onclick="backToConfig()">返回配置</button>
                </div>
            </div>
            
            <!-- 概率设置面板 -->
            <div class="probability-panel" id="probabilityPanel" style="display: none;">
                <h3>说话概率设置</h3>
                <p class="hint-text">设置为0则按顺序说话，设置概率值则随机选择（数值越大概率越高）</p>
                <div id="probabilityControls">
                    <!-- 概率控制将动态生成 -->
                </div>
                <button class="btn-primary btn-sm" onclick="toggleProbabilityPanel()">确定</button>
            </div>
            
            <!-- 对话显示区 -->
            <div class="chat-messages" id="chatMessages">
                <!-- 对话消息将显示在这里 -->
            </div>
            
            <!-- 控制区 -->
            <div class="chat-controls">
                <div class="control-buttons">
                    <button class="btn-primary btn-large" id="continueBtn" onclick="showDialogSettings()">
                        继续对话
                    </button>
                    <button class="btn-secondary btn-large" id="pauseBtn" onclick="togglePause()" style="display: none;">
                        ⏸️ 暂停
                    </button>
                </div>
                <div class="status-text" id="statusText"></div>
            </div>
        </div>
    </div>

    <!-- 对话设置模态框 -->
    <div class="dialog-settings-modal" id="dialogSettingsModal" style="display: none;">
        <div class="dialog-settings-content">
            <h3>⟨ 对话设置 ⟩</h3>
            
            <div class="settings-field">
                <label for="dialogCount">生成对话条数：</label>
                <input type="number" id="dialogCount" min="1" max="20" value="1" class="input-field">
            </div>
            
            <div class="settings-field">
                <label for="dialogTopic">当前对话主题（可选）：</label>
                <input type="text" id="dialogTopic" placeholder="例如：讨论晚餐计划、探讨魔法理论..." class="input-field">
            </div>
            
            <div class="settings-actions">
                <button class="btn-secondary" onclick="closeDialogSettings()">取消</button>
                <button class="btn-primary" onclick="startContinueDialog()">开始生成</button>
            </div>
        </div>
    </div>

    <!-- 加载事件模态框 -->
    <div class="modal" id="loadEventModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>加载保存的事件</h2>
                <button class="close-btn" onclick="closeLoadEventModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="eventsList">
                    <!-- 事件列表将动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 话题模板模态框 -->
    <div class="modal" id="topicTemplateModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>话题模板管理</h2>
                <button class="close-btn" onclick="closeTopicTemplateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="template-section">
                    <h3>📝 创建新模板</h3>
                    <div class="template-form">
                        <div class="form-field">
                            <label for="templateName">模板名称：</label>
                            <input type="text" id="templateName" class="input-field" placeholder="例如：日常对话、战斗场景...">
                        </div>
                        <div class="form-field">
                            <label for="templateContent">话题内容：</label>
                            <textarea id="templateContent" class="input-field" rows="3" placeholder="描述这个话题的内容..."></textarea>
                        </div>
                        <button class="btn-primary" onclick="saveTopicTemplate()">💾 保存模板</button>
                    </div>
                </div>
                
                <div class="template-section">
                    <h3>📋 已保存的模板</h3>
                    <div id="templatesList">
                        <!-- 模板列表将动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/free_event.js') }}"></script>
</body>
</html>
