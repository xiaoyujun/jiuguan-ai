<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码设置 - 聊天系统</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: white;
            margin: 0;
            font-size: 1.8rem;
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .password-section {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .section-header .icon {
            font-size: 2rem;
            margin-right: 1rem;
        }
        
        .section-header h2 {
            color: #333;
            margin: 0;
            font-size: 1.5rem;
        }
        
        .section-header p {
            color: #666;
            margin: 0.5rem 0 0 0;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            display: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        .strength-weak { color: #dc3545; }
        .strength-medium { color: #ffc107; }
        .strength-strong { color: #28a745; }
        
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
        
        .status-active { background: #28a745; }
        .status-inactive { background: #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>🔒 密码设置</h1>
            <div class="nav-links">
                <a href="/">🏠 首页</a>
                <a href="/storybook">📚 数据书</a>
                <a href="/logout">🚪 退出</a>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="alert alert-info" id="generalAlert">
            <strong>提示：</strong> 为了系统安全，建议为不同模块设置不同的密码。密码修改后需要重新登录相应模块。
        </div>
        
        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>
        
        <div class="module-grid">
            <!-- 聊天模块密码设置 -->
            <div class="password-section">
                <div class="section-header">
                    <div class="icon">💬</div>
                    <div>
                        <h2>聊天模块密码</h2>
                        <p><span class="status-indicator status-active" id="chatStatus"></span>控制AI聊天功能的访问权限</p>
                    </div>
                </div>
                
                <form id="chatPasswordForm">
                    <div class="form-group">
                        <label for="chatCurrentPassword">当前密码</label>
                        <input type="password" id="chatCurrentPassword" name="current_password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="chatNewPassword">新密码</label>
                        <input type="password" id="chatNewPassword" name="new_password" required 
                               oninput="checkPasswordStrength('chatNewPassword', 'chatStrength')">
                        <div class="password-strength" id="chatStrength"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="chatConfirmPassword">确认新密码</label>
                        <input type="password" id="chatConfirmPassword" name="confirm_password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">更新聊天密码</button>
                </form>
            </div>
            
            <!-- 数据书模块密码设置 -->
            <div class="password-section">
                <div class="section-header">
                    <div class="icon">📚</div>
                    <div>
                        <h2>数据书模块密码</h2>
                        <p><span class="status-indicator status-active" id="storybookStatus"></span>控制数据书管理功能的访问权限</p>
                    </div>
                </div>
                
                <form id="storybookPasswordForm">
                    <div class="form-group">
                        <label for="storybookCurrentPassword">当前密码</label>
                        <input type="password" id="storybookCurrentPassword" name="current_password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="storybookNewPassword">新密码</label>
                        <input type="password" id="storybookNewPassword" name="new_password" required
                               oninput="checkPasswordStrength('storybookNewPassword', 'storybookStrength')">
                        <div class="password-strength" id="storybookStrength"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="storybookConfirmPassword">确认新密码</label>
                        <input type="password" id="storybookConfirmPassword" name="confirm_password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">更新数据书密码</button>
                </form>
            </div>
        </div>
        
        <!-- 高级设置 -->
        <div class="password-section">
            <div class="section-header">
                <div class="icon">⚙️</div>
                <div>
                    <h2>高级设置</h2>
                    <p>批量操作和系统级设置</p>
                </div>
            </div>
            
            <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
                <button class="btn btn-secondary" onclick="syncPasswords()">🔄 同步所有密码</button>
                <button class="btn btn-secondary" onclick="resetToDefault()">🔧 重置为默认密码</button>
                <button class="btn btn-secondary" onclick="exportPasswordHash()">📋 导出密码哈希</button>
            </div>
            
            <div style="margin-top: 1rem; padding: 1rem; background: #f8f9fa; border-radius: 5px;">
                <h4>安全提示：</h4>
                <ul style="margin: 0.5rem 0; color: #666;">
                    <li>建议使用包含字母、数字和符号的强密码</li>
                    <li>不同模块使用不同密码可以提高安全性</li>
                    <li>定期更换密码以确保系统安全</li>
                    <li>不要与他人分享密码</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 检查密码强度
        function checkPasswordStrength(inputId, strengthId) {
            const password = document.getElementById(inputId).value;
            const strengthDiv = document.getElementById(strengthId);
            
            let strength = 0;
            let message = '';
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (password.length === 0) {
                strengthDiv.innerHTML = '';
                return;
            }
            
            if (strength < 2) {
                strengthDiv.innerHTML = '<span class="strength-weak">弱密码</span>';
            } else if (strength < 4) {
                strengthDiv.innerHTML = '<span class="strength-medium">中等强度</span>';
            } else {
                strengthDiv.innerHTML = '<span class="strength-strong">强密码</span>';
            }
        }
        
        // 显示提示信息
        function showAlert(type, message) {
            const alert = document.getElementById(type + 'Alert');
            alert.textContent = message;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
        
        // 更新模块密码
        async function updatePassword(module, formData) {
            try {
                const response = await fetch('/api/password_management', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        module: module,
                        current_password: formData.get('current_password'),
                        new_password: formData.get('new_password')
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('success', result.message);
                    // 清空表单
                    document.getElementById(module + 'PasswordForm').reset();
                } else {
                    showAlert('error', result.error);
                }
            } catch (error) {
                showAlert('error', '网络错误：' + error.message);
            }
        }
        
        // 验证密码确认
        function validatePasswordConfirm(newPasswordId, confirmPasswordId) {
            const newPassword = document.getElementById(newPasswordId).value;
            const confirmPassword = document.getElementById(confirmPasswordId).value;
            
            if (newPassword !== confirmPassword) {
                showAlert('error', '新密码和确认密码不匹配');
                return false;
            }
            
            if (newPassword.length < 6) {
                showAlert('error', '密码长度至少6位');
                return false;
            }
            
            return true;
        }
        
        // 聊天模块密码表单提交
        document.getElementById('chatPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validatePasswordConfirm('chatNewPassword', 'chatConfirmPassword')) {
                return;
            }
            
            const formData = new FormData(this);
            await updatePassword('chat', formData);
        });
        
        // 数据书模块密码表单提交
        document.getElementById('storybookPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validatePasswordConfirm('storybookNewPassword', 'storybookConfirmPassword')) {
                return;
            }
            
            const formData = new FormData(this);
            await updatePassword('storybook', formData);
        });
        
        // 同步所有密码
        async function syncPasswords() {
            const password = prompt('请输入要设置的统一密码：');
            if (!password) return;
            
            if (password.length < 6) {
                showAlert('error', '密码长度至少6位');
                return;
            }
            
            const currentPassword = prompt('请输入当前聊天模块密码以验证身份：');
            if (!currentPassword) return;
            
            try {
                // 更新聊天模块密码
                const chatResponse = await fetch('/api/password_management', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        module: 'chat',
                        current_password: currentPassword,
                        new_password: password
                    })
                });
                
                if (!chatResponse.ok) {
                    const result = await chatResponse.json();
                    showAlert('error', '聊天模块：' + result.error);
                    return;
                }
                
                // 更新数据书模块密码
                const storybookResponse = await fetch('/api/password_management', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        module: 'storybook',
                        current_password: currentPassword,
                        new_password: password
                    })
                });
                
                showAlert('success', '所有模块密码已同步更新');
            } catch (error) {
                showAlert('error', '同步失败：' + error.message);
            }
        }
        
        // 重置为默认密码
        async function resetToDefault() {
            if (!confirm('确定要将所有密码重置为默认密码(123456)吗？')) {
                return;
            }
            
            const currentPassword = prompt('请输入当前聊天模块密码以验证身份：');
            if (!currentPassword) return;
            
            try {
                await updatePassword('chat', new FormData([
                    ['current_password', currentPassword],
                    ['new_password', '123456']
                ]));
                
                await updatePassword('storybook', new FormData([
                    ['current_password', currentPassword],
                    ['new_password', '123456']
                ]));
                
                showAlert('success', '所有密码已重置为默认密码：123456');
            } catch (error) {
                showAlert('error', '重置失败：' + error.message);
            }
        }
        
        // 导出密码哈希
        async function exportPasswordHash() {
            try {
                const response = await fetch('/api/password_management');
                const result = await response.json();
                
                if (result.success) {
                    const info = `密码设置状态：\n聊天模块：${result.modules.chat ? '已设置' : '未设置'}\n数据书模块：${result.modules.storybook ? '已设置' : '未设置'}`;
                    alert(info);
                }
            } catch (error) {
                showAlert('error', '获取信息失败：' + error.message);
            }
        }
        
        // 页面加载时显示提示
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('generalAlert').style.display = 'block';
        });
    </script>
</body>
</html>
