<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色数据卡</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/character_card.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/storybook.css') }}">
    <style>
        /* 角色卡页面专用样式 */
        .character-card-page {
            min-height: 100vh;
            background: var(--bg-color);
            position: relative;
            padding: 20px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .character-card-page {
                padding: 10px;
            }
        }

        /* 弹窗模式优化 */
        body.popup-mode .character-card-page {
            padding: 10px;
            min-height: calc(100vh - 20px);
        }

        /* 背景装饰 */
        .character-card-page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 143, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(156, 39, 176, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(183, 115, 51, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* 主容器 */
        .card-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 2px solid var(--border-gold);
            border-radius: 20px;
            box-shadow: var(--shadow-subtle), var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .card-container::before {
            content: '◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦ ◦';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-color), transparent);
            font-size: 8px;
            color: var(--gold-color);
            text-align: center;
            line-height: 2px;
            letter-spacing: 8px;
            z-index: 1;
        }

        /* 头部区域 */
        .card-header {
            padding: 25px 30px 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background: linear-gradient(135deg, rgba(255, 143, 0, 0.1) 0%, rgba(156, 39, 176, 0.1) 100%);
        }

        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-gold);
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .character-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .selector-label {
            font-size: 16px;
            color: var(--text-color);
            font-weight: 500;
            white-space: nowrap;
        }

        .character-select {
            background: var(--secondary-color);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 15px;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            font-family: 'Crimson Text', serif;
        }

        .character-select:focus {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: 0 0 15px rgba(255, 143, 0, 0.4);
        }

        /* 操作按钮区域 */
        .action-buttons {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--card-bg) 0%, var(--secondary-color) 100%);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            border-color: var(--border-gold);
        }

        .action-btn.edit-mode {
            background: linear-gradient(135deg, var(--gold-color) 0%, #ff8f00 100%);
            border-color: var(--border-gold);
            color: var(--bg-color);
        }

        .view-storybook-btn {
            border-color: var(--border-gold);
        }

        .view-storybook-btn:hover {
            background: linear-gradient(135deg, var(--gold-color) 0%, #ff8f00 100%);
            color: var(--bg-color);
            border-color: var(--gold-color);
            box-shadow: 0 0 15px rgba(255, 143, 0, 0.4);
        }

        .close-btn {
            border-color: #d32f2f;
        }

        .close-btn:hover {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            border-color: #f44336;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.4);
        }

        .action-btn.edit-mode:hover {
            background: linear-gradient(135deg, #FFB300 0%, #FF8F00 100%);
        }

        .view-storybook-btn {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            border: 2px solid #17a2b8;
        }

        .view-storybook-btn:hover {
            background: linear-gradient(135deg, #20c997 0%, #17a2b8 100%);
        }

        .close-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border: 2px solid #c82333;
        }

        .close-btn:hover {
            background: linear-gradient(135deg, #e85360 0%, #dc3545 100%);
        }

        /* 内容区域 */
        .card-content {
            padding: 0;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        /* 加载和错误状态 */
        .loading-state, .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-color);
            font-size: 16px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--gold-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            color: #ff6b6b;
        }

        /* 角色信息显示区域 */
        .character-info {
            display: none;
        }

        .character-info.show {
            display: block;
        }

        /* 角色卡布局 */
        .character-card {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
        }

        /* 基本信息卡片 */
        .basic-info-card {
            background: linear-gradient(135deg, rgba(255, 143, 0, 0.1) 0%, rgba(156, 39, 176, 0.05) 100%);
            padding: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .character-name {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--text-gold);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .character-description {
            color: var(--text-color);
            font-size: 16px;
            line-height: 1.8;
            text-align: center;
            margin-bottom: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .character-traits {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .trait-tag {
            background: linear-gradient(135deg, var(--accent-color) 0%, #4a148c 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border-purple);
        }

        /* 属性网格 */
        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 0;
        }

        /* 属性卡片 */
        .attribute-card {
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        .attribute-card:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .attribute-header {
            background: linear-gradient(135deg, var(--accent-color) 0%, #4a148c 100%);
            color: white;
            padding: 15px 20px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .attribute-header:hover {
            background: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%);
        }

        .attribute-content {
            padding: 20px;
            display: none;
        }

        .attribute-content.expanded {
            display: block;
        }

        /* 状态卡片 - 特殊样式 */
        .status-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.1) 0%, rgba(23, 162, 184, 0.1) 100%);
        }

        .status-card .attribute-header {
            background: linear-gradient(135deg, #28a745 0%, #17a2b8 100%);
        }

        .status-card .attribute-header:hover {
            background: linear-gradient(135deg, #34ce57 0%, #20c997 100%);
        }

        /* 外貌特征卡片 */
        .appearance-card .attribute-header {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
        }

        .appearance-card .attribute-header:hover {
            background: linear-gradient(135deg, #ff8a50 0%, #ff6b35 100%);
        }

        /* 能力值卡片 */
        .abilities-card .attribute-header {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .abilities-card .attribute-header:hover {
            background: linear-gradient(135deg, #ec7063 0%, #e74c3c 100%);
        }

        /* 社交关系卡片 */
        .social-card .attribute-header {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .social-card .attribute-header:hover {
            background: linear-gradient(135deg, #bb7bd1 0%, #9b59b6 100%);
        }

        /* 背包卡片 */
        .inventory-card .attribute-header {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        .inventory-card .attribute-header:hover {
            background: linear-gradient(135deg, #f5b041 0%, #f39c12 100%);
        }

        /* 属性项样式 */
        .attribute-item {
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .attribute-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-gold);
        }

        .attribute-label {
            color: var(--text-gold);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .attribute-value {
            color: var(--text-color);
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
        }

        .attribute-value.editable {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            cursor: text;
            transition: all 0.3s ease;
        }

        .attribute-value.editable:hover {
            border-color: var(--border-gold);
        }

        .attribute-value.editable:focus {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.3);
        }

        /* 能力值特殊样式 */
        .ability-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .ability-name {
            color: var(--text-gold);
            font-weight: 500;
        }

        .ability-value {
            color: var(--text-color);
            font-weight: 600;
        }

        .ability-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0 10px;
            overflow: hidden;
        }

        .ability-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c 0%, #f39c12 50%, #27ae60 100%);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* 社交关系特殊样式 */
        .relationship-group {
            margin-bottom: 15px;
        }

        .relationship-type {
            color: var(--text-gold);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .relationship-list {
            color: var(--text-color);
            padding-left: 15px;
        }

        /* 背包物品样式 */
        .inventory-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 3px solid var(--gold-color);
        }

        .item-name {
            color: var(--text-gold);
            font-weight: 600;
            margin-right: 10px;
            min-width: 80px;
        }

        .item-description {
            color: var(--text-color);
            flex: 1;
        }

        /* 折叠箭头 */
        .section-arrow {
            transition: transform 0.3s ease;
            font-size: 14px;
        }

        .section-arrow.expanded {
            transform: rotate(90deg);
        }

        /* 编辑模式样式 */
        .edit-controls {
            display: none;
            margin-top: 10px;
            gap: 8px;
        }

        .edit-mode .edit-controls {
            display: flex;
        }

        .edit-btn-small {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border: 1px solid #c82333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .edit-btn-small:hover {
            background: linear-gradient(135deg, #e85360 0%, #dc3545 100%);
        }

        /* 保存指示器 */
        .save-indicator {
            display: none;
            margin-left: 8px;
            font-size: 12px;
        }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            .card-header {
                padding: 20px 20px 15px;
            }
            
            .header-title {
                font-size: 24px;
            }

            .character-selector {
                flex-direction: column;
                gap: 10px;
            }

            .character-select {
                min-width: 100%;
            }

            .action-buttons {
                position: static;
                justify-content: center;
                margin-top: 15px;
                gap: 4px;
                flex-wrap: nowrap;
                display: flex;
                width: 100%;
                max-width: 160px;
                margin-left: auto;
                margin-right: auto;
            }

            .action-btn {
                padding: 8px 4px;
                font-size: 11px;
                min-width: 48px;
                max-width: 52px;
                border-radius: 6px;
                flex: 1;
                white-space: nowrap;
            }

            .action-btn .btn-text {
                display: none;
            }

            .action-btn span:first-child {
                font-size: 18px;
                margin: 0;
            }

            .attributes-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 极小屏幕优化 */
        @media (max-width: 480px) {
            .action-buttons {
                gap: 3px;
                margin-top: 10px;
                flex-wrap: nowrap;
                justify-content: space-between;
                max-width: 130px;
                margin-left: auto;
                margin-right: auto;
                width: 100%;
            }

            .action-btn {
                padding: 6px 2px;
                min-width: 40px;
                max-width: 42px;
                font-size: 10px;
                flex: 1;
            }

            .action-btn span:first-child {
                font-size: 15px;
            }

            .basic-info-card {
                padding: 20px;
            }
        }

        /* 超小屏幕（小于360px）优化 */
        @media (max-width: 360px) {
            .action-buttons {
                gap: 2px;
                max-width: 120px;
            }

            .action-btn {
                padding: 6px 1px;
                min-width: 36px;
                max-width: 38px;
            }

            .action-btn span:first-child {
                font-size: 14px;
            }

            .character-name {
                font-size: 26px;
            }

            .character-description {
                font-size: 14px;
            }

            .attribute-content {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .character-card-page {
                padding: 5px;
            }

            .card-container {
                border-radius: 15px;
            }

            .basic-info-card {
                padding: 15px;
            }

            .character-name {
                font-size: 22px;
            }

            .attribute-content {
                padding: 12px;
            }

            .attribute-item {
                padding: 8px;
            }
        }

        /* 确认对话框 */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .confirm-dialog.show {
            display: flex;
        }

        .confirm-content {
            background: var(--card-bg);
            border: 2px solid var(--border-gold);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-subtle), var(--shadow-glow);
        }

        .confirm-title {
            color: var(--text-gold);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            font-family: 'Cinzel', serif;
        }

        .confirm-message {
            color: var(--text-color);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .confirm-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .confirm-btn.yes {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border-color: #c82333;
            color: white;
        }

        .confirm-btn.yes:hover {
            background: linear-gradient(135deg, #e85360 0%, #dc3545 100%);
        }

        .confirm-btn.no {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            border-color: #6c757d;
            color: white;
        }

        .confirm-btn.no:hover {
            background: linear-gradient(135deg, #7a8288 0%, #6c757d 100%);
        }

        /* 新增编辑相关样式 */
        
        /* 信息区域 */
        .info-section {
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            background: var(--card-bg);
        }

        .section-header {
            background: linear-gradient(135deg, var(--accent-color) 0%, #4a148c 100%);
            color: white;
            padding: 15px 20px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .section-header:hover {
            background: linear-gradient(135deg, #6a1b9a 0%, #4a148c 100%);
        }

        .section-content {
            display: none;
            padding: 20px;
        }

        .section-content.expanded {
            display: block;
        }

        .section-arrow {
            transition: transform 0.3s ease;
            font-size: 14px;
        }

        .section-arrow.expanded {
            transform: rotate(90deg);
        }

        /* 属性网格 */
        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        /* 属性项 */
        .attribute-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .attribute-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-gold);
        }

        .attribute-item.full-width {
            grid-column: 1 / -1;
        }

        .attribute-path {
            color: var(--text-gold);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .attribute-value {
            color: var(--text-color);
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            min-height: 20px;
            cursor: pointer;
        }

        .attribute-value.editable {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            cursor: text;
            transition: all 0.3s ease;
        }

        .attribute-value.editable:hover {
            border-color: var(--border-gold);
        }

        .attribute-value.editable:focus,
        .attribute-value.editing {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.3);
            background: var(--card-bg);
        }

        .attribute-actions {
            display: none;
            margin-top: 10px;
            gap: 8px;
        }

        .attribute-actions.show {
            display: flex;
        }

        /* 嵌套属性 */
        .nested-object {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .nested-object-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nested-object-title {
            font-weight: bold;
            color: var(--text-gold);
            font-size: 16px;
        }

        .nested-object-actions {
            display: none;
            gap: 8px;
        }

        .nested-object-actions.show {
            display: flex;
        }

        .nested-attributes {
            display: grid;
            gap: 10px;
        }

        .nested-attr-item {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 10px;
            align-items: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nested-attr-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .nested-attr-item.adding-nested-attr {
            border: 2px solid var(--border-gold);
            background: rgba(255, 143, 0, 0.1);
        }

        .nested-attr-key {
            color: var(--text-gold);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .nested-attr-key.editable {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 6px;
            cursor: text;
        }

        .nested-attr-key.editing {
            border-color: var(--border-gold);
            box-shadow: 0 0 5px rgba(255, 143, 0, 0.3);
        }

        .nested-attr-value {
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }

        .nested-attr-value.editable {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 6px;
            cursor: text;
        }

        .nested-attr-value.editing {
            border-color: var(--border-gold);
            box-shadow: 0 0 5px rgba(255, 143, 0, 0.3);
        }

        .nested-actions {
            display: none;
            gap: 4px;
        }

        .nested-actions.show {
            display: flex;
        }

        .nested-controls {
            display: none;
            margin-top: 10px;
        }

        .nested-controls.show {
            display: block;
        }

        /* 按钮样式 */
        .attr-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .attr-btn.delete-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .attr-btn.delete-btn:hover {
            background: linear-gradient(135deg, #e85360 0%, #dc3545 100%);
        }

        .attr-btn.add-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .attr-btn.add-btn:hover {
            background: linear-gradient(135deg, #34ce57 0%, #28a745 100%);
        }

        .attr-btn.save-btn {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
        }

        .attr-btn.save-btn:hover {
            background: linear-gradient(135deg, #20c997 0%, #17a2b8 100%);
        }

        .attr-btn.cancel-btn {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
        }

        .attr-btn.cancel-btn:hover {
            background: linear-gradient(135deg, #7a8288 0%, #6c757d 100%);
        }

        .add-btn.small {
            font-size: 11px;
            padding: 6px 12px;
        }

        /* 添加属性区域 */
        .add-attribute-section {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 143, 0, 0.05);
            border: 1px solid rgba(255, 143, 0, 0.2);
            border-radius: 10px;
        }

        .add-attribute-section.show {
            display: block;
        }

        .add-attribute-form .form-group {
            margin-bottom: 0;
        }

        .add-attribute-form label {
            color: var(--text-gold);
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .add-attribute-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .add-attribute-input {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-color);
            font-size: 14px;
            font-family: 'Crimson Text', serif;
        }

        .add-attribute-input:focus {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: 0 0 10px rgba(255, 143, 0, 0.3);
        }

        .add-attribute-type {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }

        .add-attribute-type:focus {
            outline: none;
            border-color: var(--border-gold);
        }

        .add-attribute-controls {
            text-align: center;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--gold-color) 0%, #ff8f00 100%);
            border: 2px solid var(--border-gold);
            color: var(--bg-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .add-btn:hover {
            background: linear-gradient(135deg, #FFB300 0%, #FF8F00 100%);
            transform: translateY(-2px);
        }

        /* 保存区域 */
        .save-section {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--card-bg);
            border: 2px solid var(--border-gold);
            border-radius: 15px;
            box-shadow: var(--shadow-subtle), var(--shadow-glow);
            backdrop-filter: blur(10px);
        }

        .save-section.show {
            display: block;
            animation: slideInUp 0.3s ease;
        }

        .save-content {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 25px;
        }

        .save-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gold);
            font-weight: 600;
        }

        .save-icon {
            font-size: 18px;
            animation: pulse 2s infinite;
        }

        .save-actions {
            display: flex;
            gap: 10px;
        }

        .save-actions .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            border: 2px solid;
        }

        .save-actions .save-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-color: #28a745;
            color: white;
        }

        .save-actions .save-btn:hover {
            background: linear-gradient(135deg, #34ce57 0%, #28a745 100%);
            transform: translateY(-2px);
        }

        .save-actions .cancel-btn {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            border-color: #6c757d;
            color: white;
        }

        .save-actions .cancel-btn:hover {
            background: linear-gradient(135deg, #7a8288 0%, #6c757d 100%);
            transform: translateY(-2px);
        }

        /* 动画 */
        @keyframes slideInUp {
            from {
                transform: translateX(-50%) translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .attributes-grid {
                grid-template-columns: 1fr;
            }
            
            .add-attribute-inputs {
                grid-template-columns: 1fr;
            }
            
            .nested-attr-item {
                grid-template-columns: 1fr;
                gap: 5px;
            }
            
            .save-content {
                flex-direction: column;
                gap: 10px;
                padding: 12px 20px;
            }
            
            .save-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="character-card-page">
        <div class="card-container">
            <!-- 头部区域 -->
            <div class="card-header">
                <h1 class="header-title">⚔️ 角色数据卡 ⚔️</h1>
                
                <!-- 角色选择器 -->
                <div class="character-selector">
                    <label class="selector-label">选择角色：</label>
                    <select id="characterSelect" class="character-select">
                        <option value="">请选择角色...</option>
                    </select>
                </div>
                
                <!-- 数据书选择器 -->
                <div id="storybookSelector" class="character-selector" style="display: none; margin-top: 10px;">
                    <label class="selector-label">数据书：</label>
                    <select id="storybookSelect" class="character-select">
                        <option value="">请选择数据书...</option>
                    </select>
                    <span id="storybookInfo" class="selector-info" style="margin-left: 10px; font-size: 12px; color: #999;"></span>
                </div>
        
                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button id="viewStorybookBtn" class="action-btn view-storybook-btn">
                        <span>📖</span>
                        <span class="btn-text">数据书</span>
                    </button>
                    <button id="editBtn" class="action-btn">
                        <span>✏️</span>
                        <span class="btn-text">编辑</span>
                    </button>
                    <button id="closeBtn" class="action-btn close-btn">
                        <span>✖️</span>
                        <span class="btn-text">关闭</span>
                    </button>
                </div>
            </div>

            <!-- 内容区域 -->
            <div class="card-content">
                <!-- 加载状态 -->
                <div id="loadingState" class="loading-state">
                    <div class="loading-spinner"></div>
                    <div>正在加载角色数据...</div>
                </div>

                <!-- 错误状态 -->
                <div id="errorState" class="error-state" style="display: none;">
                    <div>❌ 加载失败</div>
                    <div id="errorMessage"></div>
                </div>
                
                <!-- 角色信息显示区域 -->
                <div id="characterInfo" class="character-info">
                    <!-- 动态生成的角色卡内容将在这里显示 -->
                </div>
                
                <!-- 保存区域 -->
                <div id="saveSection" class="save-section">
                    <div class="save-content">
                        <div class="save-info">
                            <span class="save-icon">💾</span>
                            <span class="save-text">有未保存的更改</span>
                        </div>
                        <div class="save-actions">
                            <button id="saveBtn" class="btn save-btn">💾 保存更改</button>
                            <button id="cancelBtn" class="btn cancel-btn">❌ 取消更改</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 确认对话框 -->
            <div id="confirmDialog" class="confirm-dialog">
                <div class="confirm-content">
                    <div id="confirmTitle" class="confirm-title">确认删除</div>
                    <div id="confirmMessage" class="confirm-message"></div>
                    <div class="confirm-buttons">
                        <button id="confirmYes" class="confirm-btn yes">确认</button>
                        <button id="confirmNo" class="confirm-btn no">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 共用数据书编辑器面板（与 /storybook 同款） -->
    <div id="edit-panel" class="edit-panel">
        <div class="edit-panel-content">
            <div class="edit-panel-header">
                <h2 id="edit-title">编辑数据书</h2>
                <button class="edit-panel-close" title="关闭编辑面板">×</button>
            </div>
            <div class="edit-panel-body">
                <div id="edit-form"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/storybook_editor_shared.js') }}"></script>
    <script src="{{ url_for('static', filename='js/character_card_display.js') }}"></script>
    <script>
        // 检测是否在弹窗模式中打开
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否在弹窗中打开
            if (window.opener && window.opener !== window) {
                document.body.classList.add('popup-mode');
                
                // 修改关闭按钮的提示文本
                const closeBtn = document.getElementById('closeBtn');
                if (closeBtn) {
                    const btnText = closeBtn.querySelector('.btn-text');
                    if (btnText) {
                        btnText.textContent = '关闭';
                    }
                    closeBtn.title = '关闭当前弹窗';
                }
            }
        });
    </script>
</body>
</html>
