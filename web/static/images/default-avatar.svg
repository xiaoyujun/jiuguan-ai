<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e3d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9c9c9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="40" cy="40" r="40" fill="url(#bg)" stroke="#ff8f00" stroke-width="2"/>
  
  <!-- 头部 -->
  <circle cx="40" cy="32" r="18" fill="url(#face)"/>
  
  <!-- 身体 -->
  <ellipse cx="40" cy="65" rx="20" ry="15" fill="url(#face)"/>
  
  <!-- 眼睛 -->
  <circle cx="35" cy="28" r="2" fill="#0a0a1a"/>
  <circle cx="45" cy="28" r="2" fill="#0a0a1a"/>
  
  <!-- 嘴巴 -->
  <path d="M 35 35 Q 40 38 45 35" stroke="#0a0a1a" stroke-width="1.5" fill="none"/>
  
  <!-- 装饰性边框 -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="#ff8f00" stroke-width="1" opacity="0.5"/>
</svg>
